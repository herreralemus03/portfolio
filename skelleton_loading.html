<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neumorphism Search UI</title>

  <style>

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #e6e7ee;
      font-family: "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      color: #4b4f5c;
    }

    .container {
      width: 100%;
      max-width: 650px;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 25px;
      letter-spacing: 0.5px;
    }

    .search-wrapper {
      display: flex;
      gap: 14px;
      margin-bottom: 25px;
    }

    .search-input {
      flex: 1;
      border: none;
      outline: none;
      padding: 18px 22px;
      border-radius: 18px;
      background: #e6e7ee;
      font-size: 16px;
      color: #555;
      box-shadow:
        8px 8px 16px #c5c7d0,
        -8px -8px 16px #ffffff;
      transition: 0.2s;
    }

    .search-input:focus {
      box-shadow:
        inset 4px 4px 8px #c8cad1,
        inset -4px -4px 8px #ffffff;
    }

    .search-btn {
      border: none;
      padding: 0 26px;
      border-radius: 18px;
      background: #e6e7ee;
      cursor: pointer;
      font-weight: 600;
      color: #4b4f5c;
      box-shadow:
        8px 8px 16px #c5c7d0,
        -8px -8px 16px #ffffff;
      transition: 0.2s;
    }

    .search-btn:hover {
      transform: translateY(-1px);
    }

    .search-btn:active {
      box-shadow:
        inset 4px 4px 8px #c8cad1,
        inset -4px -4px 8px #ffffff;
    }

    .loading {
      margin-bottom: 20px;
      font-size: 14px;
      opacity: 0.65;
      padding-left: 6px;
    }

    .results {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .card {
      border-radius: 24px;
      padding: 22px;
      background: #e6e7ee;
      box-shadow:
        10px 10px 20px #c8cad1,
        -10px -10px 20px #ffffff;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 18px;
      color: #444;
    }

    .card p {
      margin: 0;
      line-height: 1.5;
      opacity: 0.8;
    }

    /* Skeleton */

    .skeleton {
      position: relative;
      overflow: hidden;
      background: #dfe1e8;
    }

    .skeleton::after {
      content: "";
      position: absolute;
      top: 0;
      left: -180px;
      width: 180px;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.7),
        transparent
      );
      animation: shimmer 1.4s infinite;
    }

    @keyframes shimmer {
      100% {
        left: 100%;
      }
    }

    .skeleton-title {
      height: 22px;
      width: 55%;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .skeleton-line {
      height: 14px;
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .skeleton-line.short {
      width: 75%;
    }

    .hidden {
      display: none;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="title">
      Search Users
    </div>

    <div class="search-wrapper">
      <input
        id="searchInput"
        class="search-input"
        type="text"
        placeholder="Search something..."
      />

      <button class="search-btn" onclick="search()">
        Search
      </button>
    </div>

    <div id="loadingText" class="loading hidden">
      Searching...
    </div>

    <div id="results" class="results"></div>

  </div>

  <script>

    function skeletonCard() {

      return `
        <div class="card">
          <div class="skeleton skeleton-title"></div>

          <div class="skeleton skeleton-line"></div>
          <div class="skeleton skeleton-line short"></div>
        </div>
      `;
    }

    function resultCard(name, role) {

      return `
        <div class="card">
          <h3>${name}</h3>
          <p>${role}</p>
        </div>
      `;
    }

    function search() {

      const results = document.getElementById("results");
      const loadingText = document.getElementById("loadingText");

      results.innerHTML = "";

      loadingText.classList.remove("hidden");

      // Skeletons
      for (let i = 0; i < 3; i++) {
        results.innerHTML += skeletonCard();
      }

      // Simulated API
      setTimeout(() => {

        loadingText.classList.add("hidden");

        results.innerHTML = `
          ${resultCard(
            "Fernando Herrera",
            "Full Stack Developer • Java • Go • Flutter"
          )}

          ${resultCard(
            "Ana López",
            "UX/UI Designer focused on minimal interfaces"
          )}

          ${resultCard(
            "Carlos Ruiz",
            "Backend Engineer specialized in cloud systems"
          )}
        `;

      }, 2500);
    }

  </script>

</body>
</html>
