<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tarjeta PRO MAX</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
body {
  margin:0;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family: Arial;
}

.wrapper { display:flex; gap:30px; }
.form { display:flex; flex-direction:column; gap:10px; }

input, select, button {
  padding:10px;
  border-radius:8px;
  border:none;
}

button { background:#22c55e; color:white; cursor:pointer; }

.card {
  width:420px;
  height:260px;
  border-radius:18px;
  overflow:hidden;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .1s ease-out;
  box-shadow:0 25px 50px rgba(0,0,0,0.7);
}

.card img {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

.layer {
  position:absolute;
  color:white;
  text-shadow:0 2px 4px rgba(0,0,0,0.8);
  -webkit-text-stroke:0.4px rgba(0,0,0,0.7);
}

.number { bottom:80px; left:40px; font-size:22px; letter-spacing:3px; }
.name { bottom:60px; left:40px; font-size:14px; }
.valid { bottom:60px; left:220px; font-size:12px; }
.brand { bottom:30px; right:30px; font-size:26px; font-weight:bold; font-style:italic; }

.glare {
  position:absolute;
  inset:0;
  background:radial-gradient(circle at var(--x,50%) var(--y,50%), rgba(255,255,255,0.25), transparent 40%);
  mix-blend-mode:overlay;
}
</style>
</head>
<body>

<div class="wrapper">

<div class="form">
  <input id="numberInput" placeholder="Número">
  <input id="nameInput" placeholder="Nombre">
  <input id="fromInput" placeholder="Desde MM/YY">
  <input id="toInput" placeholder="Hasta MM/YY">
  <select id="brandInput">
    <option value="VISA">VISA</option>
    <option value="MASTERCARD">MASTERCARD</option>
  </select>
  <button onclick="download()">Descargar</button>
</div>

<div class="card" id="card">
  <img id="bgImage" src="https://i.ibb.co/XrHg34Sv/Gemini-Generated-Image-qdczq0qdczq0qdcz.png" crossorigin="anonymous" onerror="this.style.display='none'; document.getElementById('card').style.background='linear-gradient(135deg,#1e293b,#0f172a)';" />

  <div class="layer number" id="number">0000 0000 0000 0000</div>
  <div class="layer name" id="name">NOMBRE</div>
  <div class="layer valid" id="valid">00/00 - 00/00</div>
  <div class="layer brand" id="brand">VISA</div>

  <div class="glare" id="glare"></div>
</div>

</div>

<script>
const card = document.getElementById('card');
const glare = document.getElementById('glare');

let targetX=0, targetY=0, currentX=0, currentY=0;

function animate(){
  currentX += (targetX - currentX)*0.1;
  currentY += (targetY - currentY)*0.1;
  card.style.transform = `rotateX(${currentX}deg) rotateY(${currentY}deg)`;
  requestAnimationFrame(animate);
}
animate();

function handleMove(x,y,rect){
  targetY = ((x - rect.width/2)/rect.width)*15;
  targetX = -((y - rect.height/2)/rect.height)*15;
  glare.style.setProperty('--x', x+'px');
  glare.style.setProperty('--y', y+'px');
}

card.addEventListener('mousemove', e=>{
  const r = card.getBoundingClientRect();
  handleMove(e.clientX - r.left, e.clientY - r.top, r);
});

card.addEventListener('touchmove', e=>{
  const t = e.touches[0];
  const r = card.getBoundingClientRect();
  handleMove(t.clientX - r.left, t.clientY - r.top, r);
});

card.addEventListener('mouseleave', ()=>{
  targetX = 0; targetY = 0;
});

function format(n){
  return n.replace(/\D/g,'').replace(/(.{4})/g,'$1 ').trim();
}

function luhnCheck(num){
  let arr = (num+'').split('').reverse().map(x=>parseInt(x));
  let sum = arr.reduce((acc,val,i)=> acc + (i%2?((val*=2)>9?val-9:val):val),0);
  return sum%10===0;
}

function detectBrand(num){
  if(/^4/.test(num)) return 'VISA';
  if(/^5[1-5]/.test(num)) return 'MASTERCARD';
  return '';
}

function updateCard(){
  const numRaw = document.getElementById('numberInput').value;
  const name = document.getElementById('nameInput').value;
  const from = document.getElementById('fromInput').value;
  const to = document.getElementById('toInput').value;

  const num = format(numRaw);
  document.getElementById('number').innerText = num || '0000 0000 0000 0000';
  document.getElementById('name').innerText = name.toUpperCase()||'NOMBRE';
  document.getElementById('valid').innerText = `${from} - ${to}`;

  const brand = detectBrand(numRaw);
  if(brand) document.getElementById('brand').innerText = brand;

  if(numRaw.length>=13){
    document.getElementById('number').style.color = luhnCheck(numRaw)?'#e5e7eb':'#ef4444';
  }
}

['numberInput','nameInput','fromInput','toInput'].forEach(id=>{
  document.getElementById(id).addEventListener('input', updateCard);
});

function download(){
  html2canvas(card,{scale:3}).then(canvas=>{
    const a = document.createElement('a');
    a.download='tarjeta-pro.webp';
    a.href = canvas.toDataURL('image/webp',0.95);
    a.click();
  });
}

// tests
console.assert(format('1234567812345678')==='1234 5678 1234 5678');
console.assert(luhnCheck('4242424242424242')===true);
</script>

</body>
</html>
